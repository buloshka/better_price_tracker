{% extends 'base.html' %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', path='css/auth.css') }}">
{% endblock %}

{% block body %}
<div class="form-container">
    <h2 class="form-title">Create an Account</h2>
    <p class="form-subtitle">Get started with your free account</p>

    <form action="#" method="POST">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <div class="form-group">
            <label for="telegram_id">Telegram ID <span class="label-optional">(optional)</span></label>
            <input type="text" id="telegram_id" name="telegram_id" class="form-control" placeholder="123456789">
            <span class="field-hint">Required if you want to receive instant notifications.</span>
        </div>

        <button type="submit" class="btn-submit">Sign Up</button>
    </form>

    <a href="{{ url_for('get_signin') }}" class="switch-link">
        Already have an account? Log in!
    </a>
</div>
{% endblock %}
